<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Community Resource Finder</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>

  <body>
    <header class="hero">
      <div class="hero-content">
        <p class="eyebrow">Verified Local Support</p>
        <h1>Community Resource Finder</h1>
        <p class="hero-subtitle">
          Find local food banks, clinics, shelters, and other helpful community resources.
        </p>
      </div>
    </header>

    <main class="page-shell">
      <section id="auth-section" class="panel auth-panel">
        <div id="logged-out-view">
          <h2>Login or Sign Up to View Resources</h2>
          <p class="muted">
            Create a free account to browse community resources. Resource management is restricted to the site admin.
          </p>

          <div class="auth-grid">
            <form id="login-form" class="auth-form">
              <h3>Log In</h3>
              <input type="email" id="login-email" placeholder="Email" required />
